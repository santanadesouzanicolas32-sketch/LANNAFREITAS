<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Convite – Lanna Freitas 15 Anos</title>
  <style>
    :root {
      --roxo: #4A1A7A;
      --ouro:  #C9A227;
      --ouro-claro: #EDD56A;
      --roxo-claro: #C39BD3;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background:#110622;
      font-family:'Georgia', serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── partículas ── */
    #particles { position:fixed; inset:0; pointer-events:none; z-index:0; }
    .p {
      position:absolute; border-radius:50%;
      background:var(--ouro-claro); opacity:0;
      animation:floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform:translateY(0) scale(.5); opacity:0; }
      20%  { opacity:.5; }
      80%  { opacity:.2; }
      100% { transform:translateY(-110vh) scale(1.2); opacity:0; }
    }

    /* ── telas ── */
    .screen {
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      z-index:10;
      transition:opacity .45s ease;
    }
    .screen.hidden { opacity:0; pointer-events:none; }

    /* ── imagem padrão – mantém proporção original ── */
    .screen-img {
      display:block;
      width:100vw;
      height:100vh;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
    }

    /* ════════════════════════════
       TELA 1 – ENVELOPE
    ════════════════════════════ */
    .envelope-wrapper {
      position:relative;
      cursor:pointer;
      filter:drop-shadow(0 14px 36px rgba(74,26,122,.55));
      transition:filter .3s;
    }
    .envelope-wrapper:active {
      filter:drop-shadow(0 8px 20px rgba(74,26,122,.35));
    }

    .seal-hit {
      position:absolute;
      left:50%; top:60%;
      width:22%; padding-bottom:22%;
      border-radius:50%;
      transform:translate(-50%,-50%);
      cursor:pointer;
    }

    .hint {
      position:absolute;
      top:74%; left:50%;
      transform:translateX(-50%);
      white-space:nowrap;
      color:#fff;
      font-size:clamp(11px, 3.8vw, 14px);
      font-style:italic;
      letter-spacing:1.2px;
      background:rgba(74,26,122,.6);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      padding:.35em 1.1em;
      border-radius:999px;
      border:1px solid rgba(201,162,39,.45);
      animation:pulseText 2.4s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes pulseText {
      0%,100% { opacity:1; }
      50%     { opacity:.35; }
    }

    @keyframes sealSpin {
      0%   { transform:translate(-50%,-50%) scale(1)   rotate(0deg); }
      30%  { transform:translate(-50%,-50%) scale(1.3) rotate(180deg); }
      60%  { transform:translate(-50%,-50%) scale(.85) rotate(300deg); }
      100% { transform:translate(-50%,-50%) scale(0)   rotate(360deg); opacity:0; }
    }
    @keyframes envelopeBurst {
      0%   { transform:scale(1);   opacity:1; }
      50%  { transform:scale(1.1); }
      75%  { transform:scale(.6);  opacity:.45; }
      100% { transform:scale(0);   opacity:0; }
    }
    .opening .seal-hit { animation:sealSpin .9s cubic-bezier(.6,0,.4,1) forwards; }
    .opening           { animation:envelopeBurst 1.3s .15s cubic-bezier(.6,0,.4,1) forwards; }

    .burst-particle {
      position:fixed; width:9px; height:9px;
      border-radius:50%; pointer-events:none; z-index:100;
      animation:burstOut .9s ease-out forwards;
    }
    @keyframes burstOut {
      0%   { transform:translate(0,0) scale(1); opacity:1; }
      100% { transform:translate(var(--tx),var(--ty)) scale(0); opacity:0; }
    }

    /* ════════════════════════════
       TELAS 2-5 – animações
    ════════════════════════════ */
    #screen-invite   { opacity:0; pointer-events:none; }
    #screen-interagir{ opacity:0; pointer-events:none; }
    #screen-sugestao { opacity:0; pointer-events:none; }
    #screen-manual   { opacity:0; pointer-events:none; }

    .screen.show { opacity:1 !important; pointer-events:all !important; }
    #screen-invite.show   { animation:fadeScale .8s cubic-bezier(.2,.8,.3,1) both; }
    #screen-interagir.show,
    #screen-sugestao.show,
    #screen-manual.show   { animation:fadeSlide .5s ease both; }

    @keyframes fadeScale {
      0%  { opacity:0; transform:scale(.82); }
      65% { transform:scale(1.02); }
      100%{ opacity:1; transform:scale(1); }
    }
    @keyframes fadeSlide {
      from { opacity:0; transform:translateX(18px); }
      to   { opacity:1; transform:translateX(0); }
    }

    /* ════════════════════════════
       ZONAS CLICÁVEIS – INTERAGIR
    ════════════════════════════ */
    .interagir-zone {
      position:fixed;
      cursor:pointer;
      z-index:30;
      border-radius:18px;
      background:transparent;
      transition:background .15s;
    }
    .interagir-zone:hover  { background:rgba(195,155,211,.13); }
    .interagir-zone:active { background:rgba(195,155,211,.28); }

    /* ════════════════════════════
       BOTÕES DE NAVEGAÇÃO
    ════════════════════════════ */
    .nav-btn {
      position:fixed;
      z-index:60;
      display:inline-flex;
      align-items:center;
      gap:5px;
      height:42px;
      padding:0 18px;
      border-radius:999px;
      font-family:'Georgia', serif;
      font-size:clamp(12px, 3.6vw, 14px);
      font-weight:bold;
      letter-spacing:.5px;
      border:1.5px solid rgba(201,162,39,.65);
      background:rgba(17,6,34,.78);
      color:var(--ouro-claro);
      cursor:pointer;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      box-shadow:0 3px 16px rgba(0,0,0,.4);
      transition:background .2s, transform .15s, box-shadow .2s;
      /* bottom definido por JS */
      bottom:16px;
    }
    .nav-btn:hover  { background:rgba(17,6,34,.95); box-shadow:0 5px 22px rgba(0,0,0,.5); }
    .nav-btn:active { transform:scale(.95) !important; }

    .nav-btn.right  { right:16px; }
    .nav-btn.left   { left:16px; }
    .nav-btn.center {
      left:50%; transform:translateX(-50%);
    }
    .nav-btn.center:hover { transform:translateX(-50%) translateY(-2px); }
    .nav-btn.right:hover  { transform:translateY(-2px); }
    .nav-btn.left:hover   { transform:translateY(-2px); }

    /* safe area iOS */
    @supports(padding-bottom: env(safe-area-inset-bottom)) {
      .nav-btn { bottom: max(16px, env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>

<div id="particles"></div>

<!-- ══ TELA 1: ENVELOPE ══ -->
<div class="screen" id="screen-envelope">
  <div class="envelope-wrapper" id="envelopeWrapper">
    <img class="screen-img"
         src="https://res.cloudinary.com/dhbzgqy3m/image/upload/f_auto,q_auto/envelope_tc0rpu"
         alt="Envelope do convite" draggable="false" />
    <div class="seal-hit" id="sealHit"></div>
    <p class="hint">✨ Clique no Selo para Abrir ✨</p>
  </div>
</div>

<!-- ══ TELA 2: CONVITE ══ -->
<div class="screen hidden" id="screen-invite">
  <img class="screen-img" id="inviteImg"
       src="https://res.cloudinary.com/dhbzgqy3m/image/upload/f_auto,q_auto/niver_mmmx1o"
       alt="Convite 15 anos Lanna Freitas" draggable="false" />
  <button class="nav-btn right" id="btn-invite-next">Próximo ›</button>
</div>

<script>
/* ── partículas de fundo ── */
(function() {
  const pc = document.getElementById('particles');
  for (let i = 0; i < 22; i++) {
    const d = document.createElement('div');
    d.className = 'p';
    const sz = 3 + Math.random() * 5;
    d.style.cssText =
      'left:'+(Math.random()*100)+'%;'
      +'top:'+(88+Math.random()*18)+'%;'
      +'width:'+sz+'px;height:'+sz+'px;'
      +'animation-duration:'+(6+Math.random()*8)+'s;'
      +'animation-delay:'+(Math.random()*9)+'s;';
    pc.appendChild(d);
  }
})();

/* ── burst de partículas ── */
function spawnBurst(cx, cy) {
  var colors = ['#C9A227','#EDD56A','#C39BD3','#7B3FAF','#fff'];
  for (var i = 0; i < 24; i++) {
    var b = document.createElement('div');
    b.className = 'burst-particle';
    var angle = (i/24)*Math.PI*2, dist = 70+Math.random()*110;
    b.style.cssText =
      'left:'+cx+'px;top:'+cy+'px;'
      +'background:'+colors[i%colors.length]+';'
      +'--tx:'+(Math.cos(angle)*dist)+'px;'
      +'--ty:'+(Math.sin(angle)*dist)+'px;'
      +'animation-duration:'+(0.55+Math.random()*0.4)+'s;';
    document.body.appendChild(b);
    setTimeout(function(el){ el.remove(); }, 1100, b);
  }
}

/* ── troca de telas ── */
function goTo(fromId, toId) {
  var from = document.getElementById(fromId);
  var to   = document.getElementById(toId);
  from.classList.add('hidden');
  from.classList.remove('show');
  to.classList.remove('hidden');
  requestAnimationFrame(function() { to.classList.add('show'); });
}

/* ── posicionar botões no espaço abaixo da imagem (letterbox) ── */
function setupBtnBottom(imgId) {
  var img  = document.getElementById(imgId);
  var args = Array.prototype.slice.call(arguments, 1);
  var btns = args.map(function(id) { return document.getElementById(id); });

  function calc() {
    if (!img.naturalWidth) return;
    var vw = window.innerWidth, vh = window.innerHeight;
    var scale = Math.min(vw / img.naturalWidth, vh / img.naturalHeight);
    var rh = img.naturalHeight * scale;
    var imgBottom = (vh - rh) / 2 + rh;
    var space = vh - imgBottom;
    /* espaço suficiente: centraliza no letterbox; senão usa 14px da borda */
    var bottom = (space >= 56) ? Math.round(space / 2 - 21) : 14;
    btns.forEach(function(b) { if (b) b.style.bottom = bottom + 'px'; });
  }

  if (img.complete && img.naturalWidth) { calc(); }
  else { img.addEventListener('load', calc); }
  window.addEventListener('resize', calc);
}

/* ── posicionar zonas clicáveis sobre interagir.jpeg ── */
function setupZones() {
  var img = document.getElementById('interagirImg');
  var defs = [
    { id:'zone-local',        top:0.310, bot:0.565 },
    { id:'zone-confirmar',    top:0.565, bot:0.755 },
    { id:'zone-sugestao-link',top:0.755, bot:0.945 },
  ];

  function place() {
    if (!img.naturalWidth) return;
    var vw = window.innerWidth, vh = window.innerHeight;
    var scale = Math.min(vw/img.naturalWidth, vh/img.naturalHeight);
    var rw = img.naturalWidth*scale, rh = img.naturalHeight*scale;
    var ox = (vw-rw)/2, oy = (vh-rh)/2;
    defs.forEach(function(z) {
      var el = document.getElementById(z.id);
      el.style.left   = ox + 'px';
      el.style.width  = rw + 'px';
      el.style.top    = (oy + z.top * rh) + 'px';
      el.style.height = ((z.bot - z.top) * rh) + 'px';
    });
  }

  if (img.complete && img.naturalWidth) { place(); }
  else { img.addEventListener('load', place); }
  window.addEventListener('resize', place);
}
